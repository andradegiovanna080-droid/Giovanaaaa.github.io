<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dominó Pro_REV_JAURE</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    overflow-x:hidden;
}

h1{
    text-align:center;
    padding:20px;
    font-size:40px;
}

.info,.cpu{
    text-align:center;
    margin-bottom:10px;
    font-size:20px;
}

#mesa{
    min-height:180px;
    margin:20px auto;
    width:95%;
    background:#334155;
    border-radius:20px;
    padding:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

#mano{
    width:95%;
    margin:auto;
    min-height:150px;
    background:#1e293b;
    border-radius:20px;
    padding:20px;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
}

.ficha{
    width:70px;
    height:120px;
    background:white;
    border-radius:12px;
    border:3px solid black;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    transition:.2s;
    overflow:hidden;
}

.ficha:hover{
    transform:translateY(-8px) scale(1.05);
}

.linea{
    width:100%;
    height:3px;
    background:black;
}

.lado{
    flex:1;
    width:100%;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);
    place-items:center;
    padding:5px;
}

.punto{
    width:10px;
    height:10px;
    background:black;
    border-radius:50%;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin:20px 10px;
}

button:hover{
    background:#0ea5e9;
}

.botones{
    text-align:center;
}

#mensaje{
    text-align:center;
    font-size:22px;
    margin-top:10px;
    color:#facc15;
}

@media(max-width:600px){
    .ficha{
        width:55px;
        height:95px;
    }

    .punto{
        width:8px;
        height:8px;
    }
}
</style>
</head>
<body>

<h1>🎲 Dominó Pro_REV_JAURE_OK</h1>

<div class="cpu">
🤖 Fichas CPU: <span id="cpuCount"></span>
</div>

<div class="info">
👤 Tus fichas: <span id="playerCount"></span>
</div>

<div id="mensaje">Tu turno</div>

<div id="mesa"></div>

<div id="mano"></div>

<div class="botones">
<button onclick="robar()">Robar ficha</button>
<button onclick="reiniciar()">Nuevo juego</button>
</div>

<script>
let fichas = [];
let jugador = [];
let cpu = [];
let mesa = [];
let turnoJugador = true;

function crearFichas(){
    fichas = [];
    for(let i=0;i<=6;i++){
        for(let j=i;j<=6;j++){
            fichas.push([i,j]);
        }
    }
}

function mezclar(arr){
    for(let i=arr.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
}

function repartir(){
    jugador = fichas.splice(0,7);
    cpu = fichas.splice(0,7);
}

function crearPuntos(numero){

    const posiciones = {
        0: [],
        1: [5],
        2: [1,9],
        3: [1,5,9],
        4: [1,3,7,9],
        5: [1,3,5,7,9],
        6: [1,3,4,6,7,9]
    };

    let html = "";

    for(let i=1;i<=9;i++){

        if(posiciones[numero].includes(i)){
            html += '<div class="punto"></div>';
        }else{
            html += '<div></div>';
        }
    }

    return html;
}

function crearFicha(ficha){

    let div = document.createElement("div");
    div.className="ficha";

    div.innerHTML=`
        <div class="lado">
            ${crearPuntos(ficha[0])}
        </div>

        <div class="linea"></div>

        <div class="lado">
            ${crearPuntos(ficha[1])}
        </div>
    `;

    return div;
}

function mostrarJugador(){
    const mano=document.getElementById("mano");
    mano.innerHTML="";

    jugador.forEach((ficha,index)=>{
        let div=crearFicha(ficha);

        if(turnoJugador){
            div.onclick=()=>jugarJugador(index);
        }

        mano.appendChild(div);
    });

    document.getElementById("playerCount").innerText=jugador.length;
}

function mostrarMesa(){
    const mesaDiv=document.getElementById("mesa");
    mesaDiv.innerHTML="";

    mesa.forEach(ficha=>{
        mesaDiv.appendChild(crearFicha(ficha));
    });
}

function actualizarCPU(){
    document.getElementById("cpuCount").innerText=cpu.length;
}

function puedeJugar(ficha){

    if(mesa.length===0) return true;

    let izq=mesa[0][0];
    let der=mesa[mesa.length-1][1];

    return (
        ficha[0]===izq ||
        ficha[1]===izq ||
        ficha[0]===der ||
        ficha[1]===der
    );
}

function ponerFicha(ficha,arr,index){

    if(mesa.length===0){
        mesa.push(ficha);
        arr.splice(index,1);
        return true;
    }

    let izq=mesa[0][0];
    let der=mesa[mesa.length-1][1];

    if(ficha[1]===izq){
        mesa.unshift(ficha);
    }
    else if(ficha[0]===izq){
        mesa.unshift([ficha[1],ficha[0]]);
    }
    else if(ficha[0]===der){
        mesa.push(ficha);
    }
    else if(ficha[1]===der){
        mesa.push([ficha[1],ficha[0]]);
    }
    else{
        return false;
    }

    arr.splice(index,1);
    return true;
}

function jugarJugador(index){

    if(!turnoJugador) return;

    let ficha=jugador[index];

    if(ponerFicha(ficha,jugador,index)){

        mostrarMesa();
        mostrarJugador();
        actualizarCPU();

        if(jugador.length===0){
            document.getElementById("mensaje").innerText="🎉 ¡Ganaste!";
            turnoJugador=false;
            return;
        }

        turnoJugador=false;
        document.getElementById("mensaje").innerText="🤖 Turno CPU";

        setTimeout(turnoCPU,1000);
    }
    else{
        document.getElementById("mensaje").innerText="❌ Movimiento inválido";
    }
}

function turnoCPU(){

    for(let i=0;i<cpu.length;i++){

        if(puedeJugar(cpu[i])){

            ponerFicha(cpu[i],cpu,i);

            mostrarMesa();
            actualizarCPU();

            if(cpu.length===0){
                document.getElementById("mensaje").innerText="💀 La CPU ganó";
                return;
            }

            turnoJugador=true;
            document.getElementById("mensaje").innerText="Tu turno";
            return;
        }
    }

    if(fichas.length>0){
        cpu.push(fichas.pop());
        actualizarCPU();
        setTimeout(turnoCPU,800);
    }
    else{
        turnoJugador=true;
        document.getElementById("mensaje").innerText="Tu turno";
    }
}

function robar(){

    if(!turnoJugador) return;

    if(fichas.length>0){
        jugador.push(fichas.pop());
        mostrarJugador();
    }
}

function reiniciar(){

    crearFichas();
    mezclar(fichas);
    repartir();

    mesa=[];
    turnoJugador=true;

    mostrarJugador();
    mostrarMesa();
    actualizarCPU();

    document.getElementById("mensaje").innerText="Tu turno";
}

reiniciar();
</script>

</body>
</html>
